name: Naver Stock Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # 매 15분
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Check stock
        env:
          PRODUCT_URL: ${{ secrets.PRODUCT_URL }}
          # 이메일
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          # 카카오 (선택)
          KAKAO_REST_KEY:      ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python check_naver_stock_v2.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push || true
